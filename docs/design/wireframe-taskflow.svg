  <rect x="576" y="116" width="120" height="40" rx="14" fill="#fff" stroke="#d6d3d1" stroke-width="1"/>
  <text x="592" y="141" font-size="12" fill="#57534e">Personal ⌄</text>

  <rect x="704" y="116" width="100" height="40" rx="14" fill="#fff" stroke="#d6d3d1" stroke-width="1"/>
  <text x="720" y="141" font-size="12" fill="#57534e">Media ⌄</text>

  <rect x="812" y="116" width="116" height="40" rx="14" fill="#fef3c7" stroke="#fde68a" stroke-width="1"/>
