<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" fill="none" font-family="system-ui, sans-serif">
  <rect width="960" height="640" rx="12" fill="#fafaf9" stroke="#d6d3d1" stroke-width="1.5"/>

  <!-- Header -->
  <rect x="0" y="0" width="960" height="56" rx="12" fill="#fff" stroke="#d6d3d1" stroke-width="1"/>
  <text x="24" y="35" font-size="16" font-weight="700" fill="#1c1917">TaskFlow</text>
