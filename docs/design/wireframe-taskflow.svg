<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 760" fill="none" stroke="#a8a29e" font-family="system-ui, sans-serif">
<style>
text { fill: #78716c; font-size: 12px; }
.title { fill: #44403c; font-size: 14px; font-weight: 600; }
.note { fill: #a8a29e; font-size: 11px; }
rect.dashed { stroke-dasharray: 4 3; }
</style>

<text class="title" x="340" y="20" text-anchor="middle">TaskFlow — wireframe v3</text>
<text class="note" x="340" y="36" text-anchor="middle">anillo centrado, hora+ubicación, pendiente primero, drag cross-section</text>

<!-- Top bar -->
<rect class="dashed" x="20" y="52" width="640" height="28" rx="4"/>
<text class="title" x="32" y="70">TaskFlow</text>
<rect x="560" y="56" width="40" height="20" rx="4"/><text x="580" y="70" text-anchor="middle">tema</text>
<rect x="608" y="56" width="40" height="20" rx="4"/><text x="628" y="70" text-anchor="middle">⌕</text>

<!-- Progress ring centered -->
<circle cx="340" cy="124" r="32" stroke-width="3" opacity="0.15"/>
<path d="M340 92 A32 32 0 1 1 318 152" stroke="#EF9F27" stroke-width="3" stroke-linecap="round" fill="none"/>
<text class="title" x="340" y="128" text-anchor="middle">60%</text>

<!-- Date + time + location -->
<text class="title" x="340" y="178" text-anchor="middle">jueves 19 de marzo</text>
<text class="note" x="340" y="194" text-anchor="middle">14:32 · Amsterdam, Netherlands</text>
<text x="340" y="212" text-anchor="middle">Casi lo tienes — 3 de 5</text>

<!-- Command bar -->
<rect x="120" y="232" width="380" height="36" rx="18"/>
<text x="140" y="254">¿Qué tienes que hacer?</text>
<rect x="508" y="234" width="56" height="32" rx="16"/><text x="536" y="254" text-anchor="middle">cat ⌄</text>
<rect x="570" y="234" width="50" height="32" rx="16"/><text x="595" y="254" text-anchor="middle">prio ⌄</text>

<!-- Filter pills — grid 7 cols -->
<rect x="52" y="286" width="76" height="22" rx="11" fill="#fef3c7" stroke="#fbbf24"/><text x="90" y="301" text-anchor="middle">Todas</text>
<rect x="134" y="286" width="76" height="22" rx="11"/><text x="172" y="301" text-anchor="middle">Trabajo</text>
<rect x="216" y="286" width="76" height="22" rx="11"/><text x="254" y="301" text-anchor="middle">Personal</text>
<rect x="298" y="286" width="76" height="22" rx="11"/><text x="336" y="301" text-anchor="middle">Estudio</text>
<rect x="380" y="286" width="76" height="22" rx="11"/><text x="418" y="301" text-anchor="middle">Proyectos</text>
<rect x="462" y="286" width="76" height="22" rx="11"/><text x="500" y="301" text-anchor="middle">Salud</text>
<rect x="544" y="286" width="84" height="22" rx="11"/><text x="586" y="301" text-anchor="middle">Gestiones</text>

<!-- PENDIENTE section (first) -->
<rect class="dashed" x="60" y="326" width="560" height="120" rx="12"/>
<text class="title" x="80" y="348">pendiente</text>
<text class="note" x="170" y="348">media y baja prioridad</text>
<rect x="80" y="360" width="520" height="36" rx="8"/>
<circle cx="100" cy="378" r="8"/><text x="118" y="382">Leer capítulo 4 de Node.js</text>
<text class="note" x="520" y="382" text-anchor="end">Estudio · Media</text>
<rect x="80" y="402" width="520" height="36" rx="8"/>
<circle cx="100" cy="420" r="8"/><text x="118" y="424">Comprar material oficina</text>

<!-- Drag arrow between sections -->
<text class="note" x="640" y="470" text-anchor="end">drag ↕</text>
<text class="note" x="640" y="484" text-anchor="end">cambia</text>
<text class="note" x="640" y="498" text-anchor="end">prioridad</text>

<!-- AHORA section -->
<rect class="dashed" x="60" y="458" width="560" height="76" rx="12"/>
<text x="80" y="480" fill="#d97706" font-weight="600" font-size="12">AHORA</text>
<text class="note" x="132" y="480">alta prioridad</text>
<rect x="80" y="492" width="520" height="36" rx="8"/>
<rect x="80" y="492" width="3" height="36" rx="1" fill="#fca5a5"/>
<circle cx="100" cy="510" r="8"/><text x="118" y="514">Preparar presentación Q2</text>
<text class="note" x="520" y="514" text-anchor="end">Trabajo · Alta</text>

<!-- HECHO (collapsed) -->
<rect class="dashed" x="60" y="548" width="560" height="44" rx="12" opacity="0.5"/>
<text x="80" y="574" opacity="0.5">▸ hecho (2) — colapsado</text>
<text x="580" y="574" text-anchor="end" opacity="0.5">vaciar</text>

<!-- Footer -->
<rect class="dashed" x="20" y="616" width="640" height="16" rx="0"/>
<text x="340" y="628" text-anchor="middle">footer</text>

<!-- Design decisions -->
<rect class="dashed" x="40" y="656" width="600" height="76" rx="8"/>
<text class="note" x="340" y="676" text-anchor="middle">decisiones de diseño:</text>
<text class="note" x="340" y="694" text-anchor="middle">anillo centrado como hero · hora + ciudad por IP · pendiente primero (flujo natural)</text>
<text class="note" x="340" y="712" text-anchor="middle">pills en grid fijo (no wrap) · drag entre secciones cambia prioridad · acciones hover-only</text>

<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M2 1L8 5L2 9" fill="none" stroke="#d6d3d1" stroke-width="1.5" stroke-linecap="round"/></marker></defs>
</svg>
