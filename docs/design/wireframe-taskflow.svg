  <text x="44" y="163" font-size="13" fill="#78716c">○ Pendientes</text><text x="220" y="163" font-size="11" fill="#a8a29e" text-anchor="end">2</text>
  <text x="44" y="191" font-size="13" fill="#78716c">● Completadas</text><text x="220" y="191" font-size="11" fill="#a8a29e" text-anchor="end">1</text>

  <line x1="32" y1="210" x2="240" y2="210" stroke="#e7e5e4" stroke-width="1"/>

  <text x="32" y="236" font-size="10" font-weight="700" fill="#a8a29e" letter-spacing="1.5">CATEGORÍAS</text>
  <rect x="186" y="222" width="52" height="20" rx="5" fill="#fef3c7" stroke="#fde68a" stroke-width="1"/>
  <text x="195" y="236" font-size="9" fill="#92400e">Limpiar</text>

  <text x="44" y="264" font-size="13" fill="#78716c">⬡ Trabajo</text><text x="220" y="264" font-size="11" fill="#a8a29e" text-anchor="end">1</text>
  <text x="44" y="292" font-size="13" fill="#78716c">♡ Personal</text><text x="220" y="292" font-size="11" fill="#a8a29e" text-anchor="end">1</text>
  <text x="44" y="320" font-size="13" fill="#78716c">⯋ Estudio</text><text x="220" y="320" font-size="11" fill="#a8a29e" text-anchor="end">0</text>
  <text x="44" y="348" font-size="13" fill="#78716c">⬟ Proyectos</text><text x="220" y="348" font-size="11" fill="#a8a29e" text-anchor="end">1</text>
  <text x="44" y="376" font-size="13" fill="#78716c">⊕ Salud</text><text x="220" y="376" font-size="11" fill="#a8a29e" text-anchor="end">0</text>
  <text x="44" y="404" font-size="13" fill="#78716c">◷ Gestiones</text><text x="220" y="404" font-size="11" fill="#a8a29e" text-anchor="end">0</text>

  <!-- Main content -->
  <!-- Add task section -->
  <rect x="272" y="72" width="672" height="120" rx="16" fill="#fff" stroke="#d6d3d1" stroke-width="1"/>
  <text x="296" y="104" font-size="16" font-weight="600" fill="#1c1917">Añadir nueva tarea</text>

  <rect x="288" y="116" width="280" height="40" rx="14" fill="#fff" stroke="#d6d3d1" stroke-width="1"/>
