  <text x="396" y="228" font-size="13" fill="#a8a29e">(3)</text>

  <rect x="560" y="210" width="240" height="36" rx="14" fill="#fff" stroke="#d6d3d1" stroke-width="1"/>
  <text x="584" y="233" font-size="12" fill="#a8a29e">⌕ Buscar tareas...</text>

  <rect x="812" y="212" width="116" height="32" rx="10" fill="#fff" stroke="#d6d3d1" stroke-width="1"/>
  <text x="826" y="233" font-size="11" fill="#78716c">Limpiar búsqueda</text>

  <!-- Progress bar area -->
  <rect x="288" y="252" width="640" height="56" rx="12" fill="#fefce8" stroke="#fde68a" stroke-width="0.5"/>
  <text x="304" y="273" font-size="11" fill="#78716c">Vista: Todas · Categoría: Todas</text>
  <text x="868" y="273" font-size="11" fill="#78716c" text-anchor="end">33%</text>
  <rect x="304" y="282" width="608" height="8" rx="4" fill="#e7e5e4"/>
  <rect x="304" y="282" width="200" height="8" rx="4" fill="#fbbf24"/>

  <!-- Pending section -->
  <text x="296" y="332" font-size="12" font-weight="500" fill="#a8a29e">Pendientes</text>

  <!-- Task card 1 - Alta priority with left stripe -->
  <rect x="288" y="340" width="640" height="48" rx="14" fill="#fff" stroke="#d6d3d1" stroke-width="1"/>
  <rect x="288" y="340" width="4" height="48" rx="2" fill="#fca5a5"/>
  <rect x="300" y="351" width="26" height="26" rx="7" fill="#fff" stroke="#d6d3d1" stroke-width="1"/>
  <text x="340" y="369" font-size="13" font-weight="600" fill="#1c1917">Preparar presentación Q2</text>
  <rect x="680" y="352" width="56" height="24" rx="12" fill="#fafaf9" stroke="#e7e5e4" stroke-width="0.5"/>
