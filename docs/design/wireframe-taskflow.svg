  <rect x="744" y="352" width="40" height="24" rx="12" fill="#fef2f2" stroke="#fecaca" stroke-width="0.5"/>
  <text x="755" y="368" font-size="10" font-weight="600" fill="#b91c1c">Alta</text>
  <text x="800" y="368" font-size="11" fill="#a8a29e">Editar</text>
  <text x="840" y="368" font-size="11" fill="#a8a29e">Borrar</text>

  <!-- Task card 2 -->
  <rect x="288" y="396" width="640" height="48" rx="14" fill="#fff" stroke="#d6d3d1" stroke-width="1"/>
  <rect x="300" y="407" width="26" height="26" rx="7" fill="#fff" stroke="#d6d3d1" stroke-width="1"/>
  <text x="340" y="425" font-size="13" font-weight="600" fill="#1c1917">Leer documentación Node.js</text>
  <rect x="660" y="408" width="68" height="24" rx="12" fill="#fafaf9" stroke="#e7e5e4" stroke-width="0.5"/>
  <text x="671" y="424" font-size="10" fill="#78716c">Proyectos</text>
  <rect x="736" y="408" width="48" height="24" rx="12" fill="#fafaf9" stroke="#e7e5e4" stroke-width="0.5"/>
  <text x="747" y="424" font-size="10" font-weight="600" fill="#57534e">Media</text>
  <text x="800" y="424" font-size="11" fill="#a8a29e">Editar</text>
  <text x="840" y="424" font-size="11" fill="#a8a29e">Borrar</text>

  <!-- Completed section -->
  <text x="296" y="472" font-size="12" font-weight="500" fill="#a8a29e">Tareas completadas</text>
  <rect x="816" y="456" width="108" height="28" rx="10" fill="#fff" stroke="#d6d3d1" stroke-width="1"/>
  <text x="830" y="475" font-size="11" fill="#78716c">Vaciar completadas</text>

  <!-- Completed card - opacity reduced -->
  <rect x="288" y="484" width="640" height="48" rx="14" fill="#fff" stroke="#d6d3d1" stroke-width="1" opacity="0.6"/>
  <rect x="300" y="495" width="26" height="26" rx="7" fill="#fef3c7" stroke="#fde68a" stroke-width="1" opacity="0.6"/>
  <text x="307" y="513" font-size="10" font-weight="700" fill="#92400e" opacity="0.6">✓</text>
  <text x="340" y="513" font-size="13" font-weight="600" fill="#a8a29e" text-decoration="line-through" opacity="0.6">Configurar entorno de desarrollo</text>
  <rect x="680" y="496" width="60" height="24" rx="12" fill="#fafaf9" stroke="#e7e5e4" stroke-width="0.5" opacity="0.6"/>
  <text x="691" y="512" font-size="10" fill="#78716c" opacity="0.6">Personal</text>
  <rect x="748" y="496" width="36" height="24" rx="12" fill="#fafaf9" stroke="#e7e5e4" stroke-width="0.5" opacity="0.6"/>
  <text x="759" y="512" font-size="10" fill="#78716c" opacity="0.6">Baja</text>

  <!-- Footer -->
  <rect x="0" y="610" width="960" height="30" rx="0" fill="#fafaf9" stroke="#e7e5e4" stroke-width="0.5"/>
  <text x="480" y="629" font-size="11" fill="#a8a29e" text-anchor="middle">TaskFlow · Proyecto Bootcamp InfraOps · Corner Estudios 2026</text>
