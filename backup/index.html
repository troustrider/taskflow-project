<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TaskFlow</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/output.css" />
</head>

<body class="bg-stone-50 text-stone-900 dark:bg-neutral-950 dark:text-neutral-100">
<header class="sticky top-0 z-30 border-b border-stone-200/70 bg-stone-50/90 backdrop-blur-md dark:border-neutral-800 dark:bg-neutral-950/90">
<div class="mx-auto flex max-w-6xl items-center justify-between px-6 py-4">

<div class="flex items-center gap-3">
  <h1 class="text-lg font-bold tracking-tight text-stone-900 dark:text-neutral-100">TaskFlow</h1>
  <span class="text-stone-300 dark:text-neutral-600 select-none" aria-hidden="true">|</span>
  <span class="text-lg font-normal text-stone-400 dark:text-neutral-500 select-none">Organiza tus tareas</span>
</div>

<button
id="theme-toggle"
type="button"
aria-label="Alternar tema"
class="inline-flex h-8 w-8 items-center justify-center rounded-lg border border-stone-200 bg-stone-50 text-sm
transition duration-200 ease-out hover:bg-amber-50 hover:border-amber-200 hover:text-amber-700 active:scale-[0.95]
focus:outline-none focus:ring-4 focus:ring-amber-200
dark:border-neutral-800 dark:bg-neutral-900 dark:text-neutral-400 dark:hover:bg-neutral-800 dark:hover:border-neutral-600 dark:focus:ring-neutral-700"
>
<span id="theme-icon" aria-hidden="true">◗</span>
<span id="theme-text" class="sr-only">Oscuro</span>
</button>

</div>
</header>

<div class="mx-auto flex max-w-6xl gap-6 px-6 pt-4 pb-8 max-lg:flex-col">
<aside class="w-72 shrink-0 rounded-2xl border border-stone-200 bg-stone-50 p-4 shadow-md dark:border-neutral-800 dark:bg-neutral-900 max-lg:w-full">
<nav class="space-y-6">
<section>
<h2 class="mb-2 text-xs font-bold tracking-widest text-stone-400 dark:text-neutral-600">
WORKSPACE
</h2>

<div class="space-y-1">
<button
type="button"
data-view="all"
class="workspace-btn flex w-full items-center justify-between rounded-xl px-3 py-2 text-sm font-medium
transition duration-200 ease-out hover:bg-stone-100
focus:outline-none focus:ring-4 focus:ring-amber-200
dark:hover:bg-neutral-800 dark:focus:ring-neutral-700"
>
<span class="flex items-center gap-2">⊙ Hoy</span>
<span id="all-count" class="w-6 text-right text-xs text-stone-400 dark:text-neutral-500">0</span>
</button>

<button
type="button"
data-view="pending"
class="workspace-btn flex w-full items-center justify-between rounded-xl px-3 py-2 text-sm font-medium
transition duration-200 ease-out hover:bg-stone-100
focus:outline-none focus:ring-4 focus:ring-amber-200
dark:hover:bg-neutral-800 dark:focus:ring-neutral-700"
>
<span class="flex items-center gap-2">○ Pendientes</span>
<span id="pending-count" class="w-6 text-right text-xs text-stone-400 dark:text-neutral-500">0</span>
</button>

<button
type="button"
data-view="completed"
class="workspace-btn flex w-full items-center justify-between rounded-xl px-3 py-2 text-sm font-medium
transition duration-200 ease-out hover:bg-stone-100
focus:outline-none focus:ring-4 focus:ring-amber-200
dark:hover:bg-neutral-800 dark:focus:ring-neutral-700"
>
<span class="flex items-center gap-2">● Completadas</span>
<span id="completed-count" class="w-6 text-right text-xs text-stone-400 dark:text-neutral-500">0</span>
</button>
</div>
</section>

<hr class="border-stone-200 dark:border-neutral-800" />

<section>
<div class="mb-2 flex items-center justify-between">
<h2 class="text-xs font-bold tracking-widest text-stone-400 dark:text-neutral-600">
CATEGORÍAS
</h2>

<button
id="clear-category-filter"
type="button"
class="inline-flex h-6 items-center rounded-md border border-amber-200 bg-amber-50 px-2 text-[10px] font-medium text-amber-700 shadow-sm
transition duration-200 ease-out hover:bg-amber-100 hover:text-amber-900
focus:outline-none focus:ring-2 focus:ring-amber-200
dark:border-neutral-700 dark:bg-neutral-800 dark:text-neutral-400 dark:hover:bg-neutral-700 dark:hover:text-neutral-200 dark:focus:ring-neutral-700"
>
Limpiar
</button>
</div>

<div class="space-y-1">
<button
type="button"
data-category-filter="Trabajo"
class="category-filter-btn flex w-full items-center justify-between rounded-xl px-3 py-2 text-sm font-medium
transition duration-200 ease-out hover:bg-stone-100
focus:outline-none focus:ring-4 focus:ring-amber-200
dark:hover:bg-neutral-800 dark:focus:ring-neutral-700"
>
<span class="flex items-center gap-2">⬡ Trabajo</span>
<span id="count-trabajo" class="w-6 text-right text-xs text-stone-400 dark:text-neutral-500">0</span>
</button>

<button
type="button"
data-category-filter="Personal"
class="category-filter-btn flex w-full items-center justify-between rounded-xl px-3 py-2 text-sm font-medium
transition duration-200 ease-out hover:bg-stone-100
focus:outline-none focus:ring-4 focus:ring-amber-200
dark:hover:bg-neutral-800 dark:focus:ring-neutral-700"
>
<span class="flex items-center gap-2">♡ Personal</span>
<span id="count-personal" class="w-6 text-right text-xs text-stone-400 dark:text-neutral-500">0</span>
</button>

<button
type="button"
data-category-filter="Estudio"
class="category-filter-btn flex w-full items-center justify-between rounded-xl px-3 py-2 text-sm font-medium
transition duration-200 ease-out hover:bg-stone-100
focus:outline-none focus:ring-4 focus:ring-amber-200
dark:hover:bg-neutral-800 dark:focus:ring-neutral-700"
>
<span class="flex items-center gap-2">⯋ Estudio</span>
<span id="count-estudio" class="w-6 text-right text-xs text-stone-400 dark:text-neutral-500">0</span>
</button>

<button
type="button"
data-category-filter="Proyectos"
class="category-filter-btn flex w-full items-center justify-between rounded-xl px-3 py-2 text-sm font-medium
transition duration-200 ease-out hover:bg-stone-100
focus:outline-none focus:ring-4 focus:ring-amber-200
dark:hover:bg-neutral-800 dark:focus:ring-neutral-700"
>
<span class="flex items-center gap-2">⬟ Proyectos</span>
<span id="count-proyectos" class="w-6 text-right text-xs text-stone-400 dark:text-neutral-500">0</span>
</button>

<button
type="button"
data-category-filter="Salud"
class="category-filter-btn flex w-full items-center justify-between rounded-xl px-3 py-2 text-sm font-medium
transition duration-200 ease-out hover:bg-stone-100
focus:outline-none focus:ring-4 focus:ring-amber-200
dark:hover:bg-neutral-800 dark:focus:ring-neutral-700"
>
<span class="flex items-center gap-2">⊕ Salud</span>
<span id="count-salud" class="w-6 text-right text-xs text-stone-400 dark:text-neutral-500">0</span>
</button>

<button
type="button"
data-category-filter="Errands"
class="category-filter-btn flex w-full items-center justify-between rounded-xl px-3 py-2 text-sm font-medium
transition duration-200 ease-out hover:bg-stone-100
focus:outline-none focus:ring-4 focus:ring-amber-200
dark:hover:bg-neutral-800 dark:focus:ring-neutral-700"
>
<span class="flex items-center gap-2">◷ Errands</span>
<span id="count-errands" class="w-6 text-right text-xs text-stone-400 dark:text-neutral-500">0</span>
</button>
</div>
</section>
</nav>
</aside>

<main class="flex-1 space-y-3">
<section class="rounded-2xl border border-stone-200 bg-white p-6 shadow-sm dark:border-neutral-800 dark:bg-neutral-900">
<h2 class="mb-5 text-xl font-semibold tracking-tight text-stone-800 dark:text-neutral-100">Añadir nueva tarea</h2>

<form id="task-form" class="flex flex-wrap items-center gap-3">
<input
id="task-input"
type="text"
placeholder="Escribe una tarea"
autocomplete="off"
class="min-w-[260px] flex-1 rounded-2xl border border-stone-200 bg-white px-4 py-3.5 text-sm shadow-sm
transition duration-200 ease-out hover:border-amber-300
focus:outline-none focus:ring-4 focus:ring-amber-200
dark:border-neutral-700 dark:bg-neutral-950 dark:hover:border-neutral-600 dark:focus:ring-neutral-700"
/>

<div class="relative w-full sm:w-44">
<select
id="task-category"
class="w-full appearance-none rounded-2xl border border-stone-200 bg-white px-4 py-3.5 pr-10 text-sm shadow-sm
transition duration-200 ease-out hover:border-amber-300
focus:outline-none focus:ring-4 focus:ring-amber-200
dark:border-neutral-700 dark:bg-neutral-950 dark:hover:border-neutral-600 dark:focus:ring-neutral-700"
>
<option value="Trabajo">Trabajo</option>
<option value="Personal" selected>Personal</option>
<option value="Estudio">Estudio</option>
<option value="Proyectos">Proyectos</option>
<option value="Salud">Salud</option>
<option value="Errands">Errands</option>
</select>
<span class="pointer-events-none absolute right-3 top-1/2 -translate-y-1/2 text-sm text-zinc-400">⌄</span>
</div>

<div class="relative w-full sm:w-40">
<select
id="task-priority"
class="w-full appearance-none rounded-2xl border border-stone-200 bg-white px-4 py-3.5 pr-10 text-sm shadow-sm
transition duration-200 ease-out hover:border-amber-300
focus:outline-none focus:ring-4 focus:ring-amber-200
dark:border-neutral-700 dark:bg-neutral-950 dark:hover:border-neutral-600 dark:focus:ring-neutral-700"
>
<option value="Alta">Alta</option>
<option value="Media" selected>Media</option>
<option value="Baja">Baja</option>
</select>
<span class="pointer-events-none absolute right-3 top-1/2 -translate-y-1/2 text-sm text-zinc-400">⌄</span>
</div>

<button
type="submit"
class="inline-flex h-[52px] min-w-[120px] items-center justify-center rounded-2xl
border border-amber-300 bg-amber-50 px-5 text-sm font-semibold text-amber-800 shadow-sm
transition duration-200 ease-out hover:bg-amber-100 active:scale-[0.98]
focus:outline-none focus:ring-4 focus:ring-amber-200
dark:border-neutral-700 dark:bg-neutral-800 dark:text-neutral-200 dark:hover:bg-neutral-700 dark:focus:ring-neutral-700"
>
+ Añadir
</button>
</form>
</section>

<section class="space-y-4 rounded-2xl border border-stone-200 bg-white p-4 shadow-sm dark:border-neutral-800 dark:bg-neutral-900">
<div class="flex flex-wrap items-center justify-between gap-4">
<div class="flex items-center gap-3">
<h2 class="text-xl font-semibold tracking-tight text-stone-800 dark:text-neutral-100">Mis tareas</h2>
<span id="task-count" class="text-sm font-medium text-stone-400 dark:text-neutral-500">(0)</span>
</div>

<div class="flex w-full max-w-md items-center gap-2">
<div class="relative flex-1">
<span class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-stone-400 dark:text-neutral-500">⌕</span>
<input
id="search-input"
placeholder="Buscar tareas..."
class="w-full rounded-2xl border border-stone-200 bg-white px-4 py-3 pl-10 text-sm shadow-sm
transition duration-200 ease-out hover:border-amber-300
focus:outline-none focus:ring-4 focus:ring-amber-200
dark:border-neutral-700 dark:bg-neutral-950 dark:hover:border-neutral-600 dark:focus:ring-neutral-700"
/>
</div>

<button
id="clear-search"
type="button"
class="hidden rounded-xl border border-stone-200 bg-white px-3 py-2 text-xs font-medium text-stone-600 shadow-sm
transition duration-200 ease-out hover:bg-stone-100 hover:text-stone-900
focus:outline-none focus:ring-4 focus:ring-amber-200
dark:border-neutral-700 dark:bg-neutral-950 dark:text-neutral-300 dark:hover:bg-neutral-800 dark:hover:text-neutral-100 dark:focus:ring-neutral-700"
>
Limpiar búsqueda
</button>
</div>
</div>

<div class="space-y-3 rounded-2xl border border-stone-200 bg-stone-50 p-4 dark:border-neutral-800 dark:bg-neutral-950">
<div class="flex flex-wrap items-center justify-between gap-3">
<p id="current-context" class="text-sm text-stone-500 dark:text-neutral-400">
Vista: Todas · Categoría: Todas
</p>
<span id="progress-text" class="text-sm font-medium text-stone-500 dark:text-neutral-400">0% completado</span>
</div>

<div class="h-2 overflow-hidden rounded-full bg-stone-200 dark:bg-neutral-800">
<div
id="progress-bar"
class="h-full w-0 rounded-full bg-amber-400 transition-all duration-300 ease-out dark:bg-neutral-400"
></div>
</div>
</div>

<section id="pending-section" class="space-y-2">
<h3 class="text-sm font-medium text-stone-500 dark:text-neutral-500">Pendientes</h3>
<ul id="task-list" class="space-y-3"></ul>
</section>

<section id="completed-section" class="space-y-2">
<div class="flex items-center justify-between">
<h3 class="text-sm font-medium text-stone-500 dark:text-neutral-500">Tareas completadas</h3>

<button
id="clear-completed"
class="rounded-xl border border-stone-200 bg-white px-3 py-2 text-xs font-medium shadow-sm
transition duration-200 ease-out hover:bg-stone-100
focus:outline-none focus:ring-4 focus:ring-amber-200
dark:border-neutral-700 dark:bg-neutral-950 dark:hover:bg-neutral-800 dark:focus:ring-neutral-700"
>
Vaciar completadas
</button>
</div>

<ul id="completed-list" class="space-y-3"></ul>
</section>
</section>
</main>
</div>

<script src="app.js" defer></script>
</body>
</html>
