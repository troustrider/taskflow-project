<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/output.css">
</head>

<body class="bg-stone-50 text-stone-900 dark:bg-neutral-950 dark:text-neutral-100">

<header class="sticky top-0 z-30 border-b border-stone-200/50 bg-stone-50/90 backdrop-blur-lg dark:border-neutral-800/70 dark:bg-neutral-950/90">
<div class="mx-auto flex max-w-2xl items-center justify-between px-5 py-3">
<h1 class="text-lg font-bold tracking-tight text-stone-800 dark:text-neutral-100">TaskFlow</h1>
<div class="flex items-center gap-2">
<button id="theme-toggle" type="button" aria-label="Alternar tema"
class="inline-flex h-8 w-8 items-center justify-center rounded-lg border border-stone-200/80 bg-white text-sm text-stone-500
transition duration-200 ease-out hover:border-amber-400 hover:text-amber-600 active:scale-95
focus:outline-none focus:ring-2 focus:ring-amber-400/40
dark:border-neutral-700 dark:bg-neutral-900 dark:text-neutral-400 dark:hover:border-neutral-500 dark:hover:text-neutral-200 dark:focus:ring-neutral-600">
<span id="theme-icon" aria-hidden="true">◗</span>
<span id="theme-text" class="sr-only">Oscuro</span>
</button>
<button id="toggle-search" type="button" aria-label="Buscar"
class="inline-flex h-8 w-8 items-center justify-center rounded-lg border border-stone-200/80 bg-white text-sm text-stone-500
transition duration-200 ease-out hover:border-amber-400 hover:text-amber-600 active:scale-95
focus:outline-none focus:ring-2 focus:ring-amber-400/40
dark:border-neutral-700 dark:bg-neutral-900 dark:text-neutral-400 dark:hover:border-neutral-500 dark:hover:text-neutral-200 dark:focus:ring-neutral-600">
⌕
</button>
</div>
</div>
</header>

<main class="mx-auto max-w-2xl px-5 pt-10 pb-16 space-y-10">

<section class="text-center space-y-3">
<div class="flex justify-center">
<div class="ring-widget">
<svg id="progress-ring-svg" width="80" height="80" viewBox="0 0 80 80">
<circle cx="40" cy="40" r="32" fill="none" stroke="currentColor" stroke-width="3" class="text-stone-200 dark:text-neutral-800"/>
<circle id="progress-ring" cx="40" cy="40" r="32" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"
class="text-amber-500 dark:text-amber-500 transition-all duration-500 ease-out"
stroke-dasharray="201.1" stroke-dashoffset="201.1" transform="rotate(-90 40 40)"/>
<text id="progress-percent" x="40" y="40" text-anchor="middle" dominant-baseline="central"
class="text-xs font-semibold fill-stone-700 dark:fill-neutral-200" style="font-family: var(--font-body)">0%</text>
</svg>
</div>
</div>
<div>
<p id="date-headline" class="text-xl font-semibold tracking-tight text-stone-800 dark:text-neutral-100"></p>
<p id="time-location" class="text-sm text-stone-400 dark:text-neutral-500 mt-0.5 font-mono-ui"></p>
<p id="progress-text" class="text-sm text-stone-500 dark:text-neutral-400 mt-1">Sin tareas aún</p>
</div>
</section>

<section>
<form id="task-form" class="flex flex-wrap items-center gap-2">
<div class="relative w-full sm:flex-1">
<label for="task-input" class="sr-only">Texto de la tarea</label>
<input id="task-input" type="text" placeholder="¿Qué tienes que hacer?" autocomplete="off"
class="w-full rounded-full border border-stone-200/80 bg-white px-5 py-3 text-sm placeholder-stone-400
transition duration-200 ease-out hover:border-stone-300 focus:border-amber-400 focus:outline-none focus:ring-2 focus:ring-amber-400/30
dark:border-neutral-700 dark:bg-neutral-900 dark:placeholder-neutral-500 dark:hover:border-neutral-600 dark:focus:border-neutral-500 dark:focus:ring-neutral-600">
</div>
<div class="relative flex-1 sm:flex-none">
<label for="task-category" class="sr-only">Categoría</label>
<select id="task-category"
class="w-full appearance-none rounded-full border border-stone-200/80 bg-white px-4 py-3 pr-8 text-sm text-stone-600
transition duration-200 ease-out hover:border-stone-300 focus:border-amber-400 focus:outline-none focus:ring-2 focus:ring-amber-400/30
dark:border-neutral-700 dark:bg-neutral-900 dark:text-neutral-300 dark:hover:border-neutral-600 dark:focus:border-neutral-500 dark:focus:ring-neutral-600">
<option value="Trabajo">Trabajo</option>
<option value="Personal" selected>Personal</option>
<option value="Estudio">Estudio</option>
<option value="Proyectos">Proyectos</option>
<option value="Salud">Salud</option>
<option value="Gestiones">Gestiones</option>
</select>
<span class="pointer-events-none absolute right-3 top-1/2 -translate-y-1/2 text-xs text-stone-400">⌄</span>
</div>
<div class="relative flex-1 sm:flex-none">
<label for="task-priority" class="sr-only">Prioridad</label>
<select id="task-priority"
class="w-full appearance-none rounded-full border border-stone-200/80 bg-white px-4 py-3 pr-8 text-sm text-stone-600
transition duration-200 ease-out hover:border-stone-300 focus:border-amber-400 focus:outline-none focus:ring-2 focus:ring-amber-400/30
dark:border-neutral-700 dark:bg-neutral-900 dark:text-neutral-300 dark:hover:border-neutral-600 dark:focus:border-neutral-500 dark:focus:ring-neutral-600">
<option value="Alta">Alta</option>
<option value="Media" selected>Media</option>
<option value="Baja">Baja</option>
</select>
<span class="pointer-events-none absolute right-3 top-1/2 -translate-y-1/2 text-xs text-stone-400">⌄</span>
</div>
</form>
</section>

<section id="search-section" class="hidden">
<div class="relative">
<label for="search-input" class="sr-only">Buscar tareas</label>
<span class="pointer-events-none absolute left-4 top-1/2 -translate-y-1/2 text-stone-400 dark:text-neutral-500 text-sm">⌕</span>
<input id="search-input" placeholder="Buscar tareas..."
class="w-full rounded-full border border-stone-200/80 bg-white px-5 py-3 pl-10 text-sm
transition duration-200 ease-out hover:border-stone-300 focus:border-amber-400 focus:outline-none focus:ring-2 focus:ring-amber-400/30
dark:border-neutral-700 dark:bg-neutral-900 dark:hover:border-neutral-600 dark:focus:border-neutral-500 dark:focus:ring-neutral-600">
<button id="clear-search" type="button"
class="hidden absolute right-3 top-1/2 -translate-y-1/2 rounded-md px-2 py-1 text-xs text-stone-400 hover:text-stone-700 dark:hover:text-neutral-200">
Limpiar
</button>
</div>
</section>

<section class="grid grid-cols-4 gap-1.5 sm:grid-cols-7 sm:gap-2">
<button type="button" data-category-filter="all" class="category-filter-btn rounded-full border px-2 py-1.5 text-[11px] sm:text-xs font-medium transition duration-200 ease-out focus:outline-none focus:ring-2 focus:ring-amber-400/30 dark:focus:ring-neutral-600">Todas</button>
<button type="button" data-category-filter="Trabajo" class="category-filter-btn rounded-full border px-2 py-1.5 text-[11px] sm:text-xs font-medium transition duration-200 ease-out focus:outline-none focus:ring-2 focus:ring-amber-400/30 dark:focus:ring-neutral-600">Trabajo</button>
<button type="button" data-category-filter="Personal" class="category-filter-btn rounded-full border px-2 py-1.5 text-[11px] sm:text-xs font-medium transition duration-200 ease-out focus:outline-none focus:ring-2 focus:ring-amber-400/30 dark:focus:ring-neutral-600">Personal</button>
<button type="button" data-category-filter="Estudio" class="category-filter-btn rounded-full border px-2 py-1.5 text-[11px] sm:text-xs font-medium transition duration-200 ease-out focus:outline-none focus:ring-2 focus:ring-amber-400/30 dark:focus:ring-neutral-600">Estudio</button>
<button type="button" data-category-filter="Proyectos" class="category-filter-btn rounded-full border px-2 py-1.5 text-[11px] sm:text-xs font-medium transition duration-200 ease-out focus:outline-none focus:ring-2 focus:ring-amber-400/30 dark:focus:ring-neutral-600">Proyectos</button>
<button type="button" data-category-filter="Salud" class="category-filter-btn rounded-full border px-2 py-1.5 text-[11px] sm:text-xs font-medium transition duration-200 ease-out focus:outline-none focus:ring-2 focus:ring-amber-400/30 dark:focus:ring-neutral-600">Salud</button>
<button type="button" data-category-filter="Gestiones" class="category-filter-btn rounded-full border px-2 py-1.5 text-[11px] sm:text-xs font-medium transition duration-200 ease-out focus:outline-none focus:ring-2 focus:ring-amber-400/30 dark:focus:ring-neutral-600">Gestiones</button>
</section>

<section id="next-section" class="space-y-3">
<div class="flex items-center justify-between">
<h2 class="text-xs font-semibold uppercase tracking-widest text-stone-400 dark:text-neutral-500">Pendiente</h2>
<button id="complete-all" type="button" class="rounded-lg px-3 py-1.5 text-xs font-medium text-stone-400 transition duration-200 ease-out hover:text-stone-700 hover:bg-stone-100 focus:outline-none focus:ring-2 focus:ring-amber-400/30 dark:text-neutral-500 dark:hover:text-neutral-200 dark:hover:bg-neutral-800 dark:focus:ring-neutral-600">Completar todas</button>
</div>
<ul id="next-list" data-section="next" class="space-y-2"></ul>
</section>

<section id="now-section" class="space-y-3">
<h2 class="text-xs font-semibold uppercase tracking-widest text-amber-600 dark:text-neutral-300">Ahora</h2>
<ul id="now-list" data-section="now" class="space-y-2"></ul>
</section>

<section id="done-section" class="space-y-3">
<div class="flex items-center justify-between">
<button id="toggle-done" type="button" class="flex items-center gap-2 text-xs font-semibold uppercase tracking-widest text-stone-300 dark:text-neutral-600 hover:text-stone-500 dark:hover:text-neutral-400 transition duration-200">
<span id="done-arrow" class="transition-transform duration-200">▸</span>
Hecho <span id="done-count" class="font-mono-ui">0</span>
</button>
<button id="clear-completed" type="button" class="rounded-lg px-3 py-1.5 text-xs font-medium text-stone-300 transition duration-200 ease-out hover:text-stone-600 hover:bg-stone-100 focus:outline-none focus:ring-2 focus:ring-amber-400/30 dark:text-neutral-600 dark:hover:text-neutral-300 dark:hover:bg-neutral-800 dark:focus:ring-neutral-600">Vaciar</button>
</div>
<ul id="done-list" data-section="done" class="space-y-2 hidden"></ul>
</section>

</main>

<footer class="border-t border-stone-200/40 dark:border-neutral-800/50">
<div class="mx-auto max-w-2xl px-5 py-5 text-center text-xs text-stone-300 dark:text-neutral-700">
TaskFlow · Proyecto Bootcamp InfraOps · Corner Estudios 2026
</div>
</footer>

<script src="app.js" defer></script>
</body>
</html>
