<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow</title>
    <link rel="stylesheet" href="css/output.css">
</head>
<body class="bg-white text-zinc-900 dark:bg-zinc-950 dark:text-zinc-100">
  <header class="sticky top-0 z-20 border-b border-zinc-200/70 bg-white/80 backdrop-blur dark:border-zinc-800 dark:bg-zinc-950/70">
    <div class="mx-auto flex max-w-5xl items-center justify-between px-6 py-3">
      <h1 class="text-lg font-semibold tracking-tight">TaskFlow — Organiza tus tareas</h1>

      <button
        id="theme-toggle"
        type="button"
        class="rounded-xl border border-zinc-200 bg-zinc-50 px-3 py-2 text-sm font-medium
               transition hover:bg-zinc-100 focus:outline-none focus:ring-4 focus:ring-zinc-200
               dark:border-zinc-800 dark:bg-zinc-900 dark:hover:bg-zinc-800 dark:focus:ring-zinc-800"
      >
        🌙/☀️
      </button>
    </div>
  </header>

  <div class="mx-auto flex max-w-5xl gap-6 px-6 py-6">
    <aside class="w-72 shrink-0 rounded-2xl border border-zinc-200 bg-zinc-50 p-4 dark:border-zinc-800 dark:bg-zinc-900/40">
      <nav class="space-y-5">
        <section>
          <h2 class="mb-2 text-xs font-bold tracking-widest text-zinc-500 dark:text-zinc-400">WORKSPACE</h2>
          <ul class="space-y-1">
            <li><a class="flex items-center gap-2 rounded-xl px-3 py-2 text-sm font-medium text-zinc-800 transition hover:bg-zinc-100 dark:text-zinc-100 dark:hover:bg-zinc-800/60" href="#">📅 Hoy</a></li>
            <li><a class="flex items-center gap-2 rounded-xl px-3 py-2 text-sm font-medium text-zinc-700 transition hover:bg-zinc-100 dark:text-zinc-200 dark:hover:bg-zinc-800/60" href="#">📌 Pendientes</a></li>
            <li><a class="flex items-center gap-2 rounded-xl px-3 py-2 text-sm font-medium text-zinc-700 transition hover:bg-zinc-100 dark:text-zinc-200 dark:hover:bg-zinc-800/60" href="#">🗓️ Calendario</a></li>
          </ul>
        </section>

        <section>
          <h2 class="mb-2 text-xs font-bold tracking-widest text-zinc-500 dark:text-zinc-400">CATEGORÍAS</h2>
          <ul class="space-y-1">
            <li><a class="flex items-center gap-2 rounded-xl px-3 py-2 text-sm font-medium text-zinc-700 transition hover:bg-zinc-100 dark:text-zinc-200 dark:hover:bg-zinc-800/60" href="#">💼 Trabajo</a></li>
            <li><a class="flex items-center gap-2 rounded-xl px-3 py-2 text-sm font-medium text-zinc-700 transition hover:bg-zinc-100 dark:text-zinc-200 dark:hover:bg-zinc-800/60" href="#">🏠 Personal</a></li>
            <li><a class="flex items-center gap-2 rounded-xl px-3 py-2 text-sm font-medium text-zinc-700 transition hover:bg-zinc-100 dark:text-zinc-200 dark:hover:bg-zinc-800/60" href="#">📚 Estudio</a></li>
          </ul>
        </section>
      </nav>
    </aside>

    <main class="flex-1 space-y-6">
      <section class="rounded-2xl border border-zinc-200 bg-white p-5 dark:border-zinc-800 dark:bg-zinc-900/40">
        <h2 class="mb-3 text-xl font-semibold tracking-tight">Añadir nueva tarea</h2>
<form id="task-form" class="flex flex-col gap-2 sm:flex-row sm:items-center">
  <input
    id="task-input"
    class="w-full rounded-xl border border-zinc-200 bg-white px-4 py-3 text-sm
           transition focus:outline-none focus:ring-4 focus:ring-zinc-200
           dark:border-zinc-800 dark:bg-zinc-950 dark:focus:ring-zinc-800"
    type="text"
    placeholder="Escribe una tarea"
    autocomplete="off"
  />
  <button
    type="submit"
    class="rounded-xl border border-zinc-200 bg-zinc-50 px-4 py-3 text-sm font-semibold
           transition hover:bg-zinc-100 focus:outline-none focus:ring-4 focus:ring-zinc-200
           dark:border-zinc-800 dark:bg-zinc-900 dark:hover:bg-zinc-800 dark:focus:ring-zinc-800"
  >
    Añadir
  </button>
</form>
      </section>

      <section class="space-y-3">
        <h2 class="text-xl font-semibold tracking-tight">Mis tareas</h2>

        <input
          id="search-input"
          class="w-full rounded-xl border border-zinc-200 bg-white px-4 py-3 text-sm
                 transition focus:outline-none focus:ring-4 focus:ring-zinc-200
                 dark:border-zinc-800 dark:bg-zinc-950 dark:focus:ring-zinc-800"
          type="text"
          placeholder="Buscar tareas…"
          autocomplete="off"
        />

        <ul id="task-list" class="space-y-2"></ul>
      </section>
    </main>
</div>
<script src="app.js" defer></script>

</body>
</html>
